<!DOCTYPE html>
<html>
<head>
<title>Add Hotel</title>

<link rel="stylesheet" href="add-hotel.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="page">

<div class="form-card">

<h2>Add New Hotel</h2>

<form id="hotelForm">

<div class="input-group">
<input type="text" id="name" placeholder="Hotel Name" required>
</div>

<div class="input-group">
<input type="text" id="location" placeholder="Location" required>
</div>

<div class="input-group">
<textarea id="description" placeholder="Description"></textarea>
</div>

<div class="input-group">
<input type="number" id="stars" placeholder="Stars (1-5)" required>
</div>

<div class="input-group">
<input type="number" id="price" placeholder="Price Per Night (₹)" required>
</div>

<div class="input-group">
<input type="text" id="image" placeholder="Hotel Image URL" required>
</div>

<button type="submit" class="submit-btn">Add Hotel</button>

</form>

</div>

</div>

<script src="add-hotel.js"></script>

</body>
</html>
